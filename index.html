<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Criador de animação Freehand</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: #1a1a1a;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            opacity: 0;
            animation: smoothPageLoad 0.5s ease-out forwards;
        }

        @keyframes smoothPageLoad {
            0% {
                opacity: 0;
                transform: scale(0.98);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .author-brand {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 0.5px;
            z-index: 10;
            opacity: 0.8;
        }

        /* Botão do Instagram com hover vermelho */
        .instagram-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background-color: #262626;
            color: #ffffff;
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .instagram-btn:hover {
            background-color: #c20000;
            border-color: #c20000;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 6px 16px rgba(194, 0, 0, 0.4);
        }

        .instagram-btn:active {
            transform: translateY(0) scale(0.98);
        }

        /* Ícone do Instagram (simples usando SVG inline) */
        .instagram-icon {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .status-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #888;
            border-radius: 50%;
        }

        .status-dot.recording {
            background-color: #e31414;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }

        .canvas-container {
            flex: 1;
            position: relative;
            background-color: #222222;
            margin: 60px 15px 15px 15px;
            border-radius: 8px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            touch-action: none;
        }

        .loader-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 26, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border-radius: 8px;
        }

        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top-color: #c20000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .progress-container {
            width: 60%;
            max-width: 300px;
            background-color: #333;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background-color: #c20000;
            transition: width 0.1s linear;
        }

        .control-panel {
            background-color: #262626;
            border-top: 3px solid #c20000;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .control-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .color-palette {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .color-swatch {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .color-swatch:hover {
            transform: scale(1.15);
        }

        .color-swatch.active {
            border-color: #ffffff;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }

        .custom-color-picker {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #1a1a1a;
            padding: 3px 8px;
            border-radius: 6px;
            border: 1px solid #444;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }

        .custom-color-picker:hover {
            border-color: #c20000;
            box-shadow: 0 0 5px rgba(194, 0, 0, 0.4);
        }

        .custom-color-picker input[type="color"] {
            border: none;
            background: none;
            width: 24px;
            height: 24px;
            cursor: pointer;
        }

        .custom-color-picker input[type="text"] {
            background: none;
            border: none;
            color: #fff;
            width: 70px;
            font-size: 0.8rem;
            text-transform: uppercase;
            outline: none;
            cursor: pointer;
        }

        .tool-settings {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
        }

        .tool-settings input[type="range"] {
            accent-color: #c20000;
            cursor: pointer;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }

        .btn {
            background-color: #333333;
            color: #ffffff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background-color: #444444;
        }

        .btn-primary {
            background-color: #c20000;
        }

        .btn-primary:hover {
            background-color: #a00000;
        }

        .btn-recording {
            background-color: #e31414;
            animation: pulse 1s infinite alternate;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .control-row {
                justify-content: space-between;
            }
            .action-buttons {
                width: 100%;
                justify-content: space-between;
                margin-left: 0;
            }
            .action-buttons .btn {
                flex: 1;
                justify-content: center;
            }
            .instagram-btn {
                bottom: 15px;
                right: 15px;
                padding: 8px 14px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <!-- Texto de crédito substituído por um botão funcional com link -->
    <div class="author-brand">Freehand Animator</div>
    
    <!-- Botão com hover vermelho e link para o Instagram -->
    <a href="https://www.instagram.com/dicarvalho.prof/" 
       class="instagram-btn" 
       target="_blank" 
       rel="noopener noreferrer"
       aria-label="Instagram do Professor Di Carvalho">
        <svg class="instagram-icon" viewBox="0 0 24 24" width="18" height="18" fill="white">
            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.266.07 1.646.07 4.85s-.012 3.584-.07 4.85c-.148 3.228-1.667 4.771-4.919 4.919-1.266.058-1.646.07-4.85.07s-3.584-.012-4.85-.07c-3.252-.148-4.771-1.691-4.919-4.919-.058-1.266-.07-1.646-.07-4.85s.012-3.584.07-4.85c.148-3.228 1.667-4.771 4.919-4.919 1.266-.058 1.646-.07 4.85-.07zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.053.014 8.333 0 8.741 0 12c0 3.259.014 3.667.072 4.947.2 4.363 2.622 6.781 6.98 6.981 1.28.058 1.688.072 4.948.072s3.667-.014 4.947-.072c4.363-.2 6.781-2.618 6.981-6.981.058-1.28.072-1.688.072-4.947s-.014-3.667-.072-4.947c-.2-4.363-2.618-6.781-6.981-6.981C15.667.014 15.259 0 12 0z"/>
            <path d="M12 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.88 1.44 1.44 0 000-2.88z"/>
        </svg>
        @dicarvalho.prof
    </a>

    <div class="status-badge">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Pronto</span>
    </div>

    <div class="canvas-container" id="canvasContainer">
        <div class="loader-overlay" id="loaderOverlay">
            <div class="loader-spinner"></div>
            <p id="loaderText">Renderizando animação...</p>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>
        
        <canvas id="paintCanvas"></canvas>
    </div>

    <div class="control-panel">
        <div class="control-row">
            <div class="color-palette" id="colorPalette"></div>

            <div class="custom-color-picker" id="pickerWrapper">
                <input type="color" id="htmlColorPicker" value="#c20000">
                <input type="text" id="hexTextInput" value="#C20000" maxlength="7">
            </div>

            <div class="tool-settings">
                <span>Espessura:</span>
                <input type="range" id="lineWidthSlider" min="2" max="25" value="5">
                <span id="lineWidthVal">5px</span>
            </div>
        </div>

        <div class="control-row">
            <div class="action-buttons">
                <button class="btn" id="btnClear">Limpar Canvas</button>
                <button class="btn btn-primary" id="btnRecord">Iniciar Gravação</button>
                <button class="btn" id="btnGenerate" disabled>Gerar GIF</button>
            </div>
        </div>
    </div>

    <script>
        // Motor de Renderização GIFENC Embutido de Alta Performance
        const gifenc = (function() {
            function GIFEncoder(opts = {}) {
                const stream = [];
                let width = 0, height = 0;
                let firstFrame = true;
                return {
                    writeHeader() {
                        stream.push(71, 73, 70, 56, 57, 97);
                    },
                    writeLogicalScreenDescriptor(w, h, globalPalette = false) {
                        width = w; height = h;
                        stream.push(w & 0xff, (w >> 8) & 0xff);
                        stream.push(h & 0xff, (h >> 8) & 0xff);
                        stream.push(globalPalette ? 0x80 | 0x70 | 7 : 0);
                        stream.push(0, 0);
                    },
                    writeApplicationExtension() {
                        stream.push(0x21, 0xff, 11);
                        const arr = [78, 69, 84, 83, 67, 65, 80, 69, 50, 46, 48];
                        for(let i=0; i<11; i++) stream.push(arr[i]);
                        stream.push(3, 1, 0, 0, 0);
                    },
                    writeGraphicControlExtension(delay, transparentIndex) {
                        stream.push(0x21, 0xf9, 4);
                        const hasTransparent = transparentIndex !== null && transparentIndex !== undefined;
                        stream.push(hasTransparent ? 9 : 0);
                        stream.push(delay & 0xff, (delay >> 8) & 0xff);
                        stream.push(hasTransparent ? transparentIndex : 0);
                        stream.push(0);
                    },
                    writeImageDescriptor(w, h, localPalette = false) {
                        stream.push(0x2c);
                        stream.push(0, 0, 0, 0);
                        stream.push(w & 0xff, (w >> 8) & 0xff);
                        stream.push(h & 0xff, (h >> 8) & 0xff);
                        stream.push(localPalette ? 0x80 | 7 : 0);
                    },
                    writeColorTable(palette) {
                        for (let i = 0; i < 256; i++) {
                            if (i < palette.length) {
                                stream.push(palette[i][0], palette[i][1], palette[i][2]);
                            } else {
                                stream.push(0, 0, 0);
                            }
                        }
                    },
                    writePixels(indexData) {
                        stream.push(8);
                        let lzwBits = 9;
                        let clearCode = 256;
                        let endCode = 257;
                        let nextCode = 258;
                        let prefix = [];
                        let outputArr = [];
                        let outputBits = 0;
                        let outputBuffer = 0;

                        function writeBits(code, bits) {
                            outputBuffer |= (code << outputBits);
                            outputBits += bits;
                            while (outputBits >= 8) {
                                outputArr.push(outputBuffer & 0xff);
                                outputBuffer >>= 8;
                                outputBits -= 8;
                            }
                        }

                        writeBits(clearCode, lzwBits);

                        const dict = new Map();

                        for (let i = 0; i < indexData.length; i++) {
                            let k = indexData[i];
                            let key = prefix.length === 0 ? String(k) : prefix.join(',') + ',' + k;
                            if (dict.has(key)) {
                                prefix.push(k);
                            } else {
                                if (prefix.length === 0) {
                                    writeBits(0, lzwBits);
                                } else {
                                    let pKey = prefix.join(',');
                                    let code = prefix.length === 1 ? prefix[0] : dict.get(pKey);
                                    writeBits(code, lzwBits);
                                }
                                dict.set(key, nextCode++);
                                if (nextCode === (1 << lzwBits) + 1) {
                                    lzwBits++;
                                }
                                if (nextCode >= 4094) {
                                    writeBits(clearCode, lzwBits);
                                    dict.clear();
                                    lzwBits = 9;
                                    nextCode = 258;
                                }
                                prefix = [k];
                            }
                        }

                        if (prefix.length > 0) {
                            let pKey = prefix.join(',');
                            let code = prefix.length === 1 ? prefix[0] : dict.get(pKey);
                            writeBits(code, lzwBits);
                        }

                        writeBits(endCode, lzwBits);

                        while (outputBits > 0) {
                            outputArr.push(outputBuffer & 0xff);
                            outputBuffer >>= 8;
                            outputBits -= 8;
                        }

                        let idx = 0;
                        while (idx < outputArr.length) {
                            let size = Math.min(255, outputArr.length - idx);
                            stream.push(size);
                            for (let i = 0; i < size; i++) {
                                stream.push(outputArr[idx + i]);
                            }
                            idx += size;
                        }
                        stream.push(0);
                    },
                    addFrame(rgbaData, w, h, delay) {
                        if (firstFrame) {
                            this.writeHeader();
                            this.writeLogicalScreenDescriptor(w, h, false);
                            firstFrame = false;
                        }

                        const paletteMap = new Map();
                        const palette = [];
                        
                        palette.push([0, 0, 0]); 
                        paletteMap.set('0,0,0,0', 0);

                        const indexData = new Uint8Array(w * h);

                        for (let i = 0; i < rgbaData.length; i += 4) {
                            let r = rgbaData[i];
                            let g = rgbaData[i+1];
                            let b = rgbaData[i+2];
                            let a = rgbaData[i+3];
                            let pixelIdx = i / 4;

                            if (a < 128) {
                                indexData[pixelIdx] = 0;
                            } else {
                                let key = `${r},${g},${b}`;
                                if (!paletteMap.has(key)) {
                                    if (palette.length < 256) {
                                        paletteMap.set(key, palette.length);
                                        palette.push([r, g, b]);
                                    } else {
                                        paletteMap.set(key, 255);
                                    }
                                }
                                indexData[pixelIdx] = paletteMap.get(key);
                            }
                        }

                        if(stream.length === 6 + 7) {
                            this.writeApplicationExtension();
                        }

                        this.writeGraphicControlExtension(delay, 0);
                        this.writeImageDescriptor(w, h, true);
                        this.writeColorTable(palette);
                        this.writePixels(indexData);
                    },
                    getBlob() {
                        stream.push(0x3b);
                        return new Blob([new Uint8Array(stream)], { type: 'image/gif' });
                    }
                };
            }
            return { GIFEncoder };
        })();
    </script>

    <script>
        const canvas = document.getElementById('paintCanvas');
        // Adicionada a flag willReadFrequently para otimizar a performance de leitura de pixels
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const container = document.getElementById('canvasContainer');
        
        const paletteContainer = document.getElementById('colorPalette');
        const htmlColorPicker = document.getElementById('htmlColorPicker');
        const hexTextInput = document.getElementById('hexTextInput');
        const pickerWrapper = document.getElementById('pickerWrapper');
        const lineWidthSlider = document.getElementById('lineWidthSlider');
        const lineWidthVal = document.getElementById('lineWidthVal');
        const btnClear = document.getElementById('btnClear');
        const btnRecord = document.getElementById('btnRecord');
        const btnGenerate = document.getElementById('btnGenerate');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        
        const loaderOverlay = document.getElementById('loaderOverlay');
        const loaderText = document.getElementById('loaderText');
        const progressBar = document.getElementById('progressBar');

        let isPainting = false;
        let currentColor = '#c20000';
        let currentWidth = 5;

        let isRecording = false;
        let recordedFrames = [];
        let recordInterval = null;
        
        const fps = 10; 

        const defaultColors = [
            '#c20000', '#000000', '#ffffff', '#e31414', 
            '#ffb600', '#0bde00', '#1866c7', '#7818c7', '#b86c39'
        ];

        function resizeCanvas() {
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            tempCtx.drawImage(canvas, 0, 0);

            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.drawImage(tempCanvas, 0, 0);
        }

        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 100);

        function initPalette() {
            defaultColors.forEach((color, index) => {
                const swatch = document.createElement('div');
                swatch.className = `color-swatch ${index === 0 ? 'active' : ''}`;
                swatch.style.backgroundColor = color;
                swatch.dataset.color = color;
                
                swatch.addEventListener('click', () => {
                    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                    swatch.classList.add('active');
                    updateColor(color);
                });
                paletteContainer.appendChild(swatch);
            });
        }
        initPalette();

        function updateColor(color) {
            currentColor = color;
            htmlColorPicker.value = color;
            hexTextInput.value = color.toUpperCase();
        }

        pickerWrapper.addEventListener('click', (e) => {
            if(e.target !== hexTextInput) {
                htmlColorPicker.click();
            }
        });

        htmlColorPicker.addEventListener('input', (e) => {
            updateColor(e.target.value);
            document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
        });

        hexTextInput.addEventListener('change', (e) => {
            let val = e.target.value;
            if(!val.startsWith('#')) val = '#' + val;
            if(/^#[0-9A-F]{6}$/i.test(val)) {
                updateColor(val);
                document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
            } else {
                hexTextInput.value = currentColor.toUpperCase();
            }
        });

        lineWidthSlider.addEventListener('input', (e) => {
            currentWidth = e.target.value;
            lineWidthVal.textContent = `${currentWidth}px`;
        });

        function getCoordinates(e) {
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            const rect = canvas.getBoundingClientRect();
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function startPainting(e) {
            isPainting = true;
            ctx.beginPath();
            const coords = getCoordinates(e);
            ctx.moveTo(coords.x, coords.y);
            ctx.lineTo(coords.x, coords.y);
            ctx.lineWidth = currentWidth;
            ctx.strokeStyle = currentColor;
            ctx.stroke();
        }

        function draw(e) {
            if (!isPainting) return;
            e.preventDefault();
            const coords = getCoordinates(e);
            ctx.lineWidth = currentWidth;
            ctx.strokeStyle = currentColor;
            ctx.lineTo(coords.x, coords.y);
            ctx.stroke();
        }

        function stopPainting() {
            isPainting = false;
            ctx.beginPath();
        }

        canvas.addEventListener('mousedown', startPainting);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopPainting);

        canvas.addEventListener('touchstart', startPainting, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        window.addEventListener('touchend', stopPainting);

        btnClear.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(!isRecording) {
                recordedFrames = [];
                btnGenerate.disabled = true;
            }
        });

        function captureFrame() {
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            recordedFrames.push(imgData);
        }

        btnRecord.addEventListener('click', () => {
            if (!isRecording) {
                isRecording = true;
                recordedFrames = [];
                btnGenerate.disabled = true;
                btnClear.disabled = true;
                
                btnRecord.textContent = 'Parar Gravação';
                btnRecord.classList.add('btn-recording');
                statusDot.classList.add('recording');
                statusText.textContent = 'Gravando...';

                recordInterval = setInterval(captureFrame, 1000 / fps);
            } else {
                isRecording = false;
                clearInterval(recordInterval);
                
                btnRecord.textContent = 'Iniciar Gravação';
                btnRecord.classList.remove('btn-recording');
                statusDot.classList.remove('recording');
                statusText.textContent = `Salvos ${recordedFrames.length} frames`;
                
                btnClear.disabled = false;
                if (recordedFrames.length > 0) {
                    btnGenerate.disabled = false;
                }
            }
        });

        btnGenerate.addEventListener('click', () => {
            if (recordedFrames.length === 0) return;

            loaderOverlay.style.display = 'flex';
            progressBar.style.width = '0%';
            loaderText.textContent = 'Iniciando compilação assíncrona...';
            
            btnGenerate.disabled = true;
            btnRecord.disabled = true;

            const encoder = new gifenc.GIFEncoder();
            const totalFrames = recordedFrames.length;
            const delayInCentiseconds = Math.round(100 / fps);
            let currentFrameIndex = 0;

            // Processamento fatiado para dar fôlego ao processador do navegador
            function processNextFrame() {
                if (currentFrameIndex < totalFrames) {
                    encoder.addFrame(recordedFrames[currentFrameIndex].data, canvas.width, canvas.height, delayInCentiseconds);
                    
                    currentFrameIndex++;
                    
                    let pct = Math.floor((currentFrameIndex / totalFrames) * 100);
                    progressBar.style.width = `${pct}%`;
                    loaderText.textContent = `Compilando frames: ${pct}%`;
                    
                    // Agenda o próximo frame liberando a thread principal por 1 milissegundo
                    setTimeout(processNextFrame, 1);
                } else {
                    finalizeGif();
                }
            }

            function finalizeGif() {
                loaderText.textContent = 'Pronto! Baixando...';
                
                setTimeout(() => {
                    try {
                        const blob = encoder.getBlob();
                        const downloadLink = document.createElement('a');
                        downloadLink.href = URL.createObjectURL(blob);
                        downloadLink.download = `animacao_dicarvalho_${Date.now()}.gif`;
                        document.body.appendChild(downloadLink);
                        downloadLink.click();
                        document.body.removeChild(downloadLink);
                    } catch (err) {
                        console.error("Erro ao gerar o Blob:", err);
                    }
                    
                    loaderOverlay.style.display = 'none';
                    btnRecord.disabled = false;
                    btnGenerate.disabled = false;
                    statusText.textContent = 'Pronto';
                }, 300);
            }

            // Inicializa a esteira de processamento seguro
            setTimeout(processNextFrame, 10);
        });
    </script>
</body>
</html>
